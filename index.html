<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>拼拼熊大冒险 V3 - 1A/2A 随机版</title>
<style>
:root{
  --kaiti:"KaiTi","STKaiti","楷体","KaiTi_GB2312",serif;
  --ui:"Arial Rounded MT Bold","Segoe UI",sans-serif;
}
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;font-family:var(--ui);background:#10182b;color:#fff;}
button,input{font-family:var(--ui)}
#app{position:relative;width:100vw;height:100vh;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;overflow:hidden}.screen.active{display:block}
.bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}.layer{position:absolute;inset:0;pointer-events:none}
.float{animation:float 2.4s ease-in-out infinite}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.pulse{animation:pulse 1.2s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.btn{border:0;border-radius:999px;padding:14px 28px;font-size:22px;font-weight:800;cursor:pointer;background:linear-gradient(180deg,#ffe071,#ff9f1c);box-shadow:0 8px 0 #b85d00,0 14px 25px rgba(0,0,0,.25);color:#542600;transition:.12s;position:relative;z-index:10}.btn:hover{filter:brightness(1.08);transform:translateY(-2px)}.btn:active{transform:translateY(5px);box-shadow:0 3px 0 #b85d00}
.smallbtn{font-size:16px;padding:9px 16px}
.panel{position:relative;z-index:5;background:rgba(255,255,255,.16);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.35);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.title{font-family:var(--kaiti);font-size:62px;margin:0;text-shadow:0 6px 0 rgba(0,0,0,.18)}
.subtitle{font-family:var(--kaiti);font-size:28px;margin:10px 0 22px;color:#fff7cd}.menu{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:28px}.menu .panel{padding:36px;max-width:900px;width:min(92vw,900px)}
.grade-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin:22px 0}.grade-card{width:250px;min-height:150px;padding:22px;border-radius:26px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);cursor:pointer;transition:.15s}.grade-card:hover{transform:translateY(-6px);background:rgba(255,255,255,.27)}.grade-card.selected{outline:5px solid #ffe071;background:rgba(255,224,113,.3)}.grade-card h2{font-family:var(--kaiti);font-size:34px;margin:0 0 12px}.grade-card p{font-family:var(--kaiti);font-size:22px;margin:0;color:#fff7cd}
.map-path{position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,#7fdfff55,transparent 25%),linear-gradient(145deg,#4d7cff,#9257ff 45%,#ff7fb5);}
.cloud{position:absolute;font-size:58px;opacity:.75;animation:drift 16s linear infinite}.c1{top:10%;left:-10%;animation-duration:25s}.c2{top:30%;left:-20%;animation-duration:32s}.c3{top:70%;left:-15%;animation-duration:28s}@keyframes drift{from{transform:translateX(0)}to{transform:translateX(125vw)}}
.map-nodes{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:42px;z-index:4;flex-wrap:wrap;padding:40px}.node{width:220px;height:220px;border-radius:44px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.38);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.25)}.node .emoji{font-size:70px}.node h3{font-family:var(--kaiti);font-size:28px;margin:10px 0 4px}.node p{font-size:16px;margin:0 0 12px;color:#fff7cd}.locked{filter:grayscale(.8);opacity:.55}
#game{background:#111}.hud{position:absolute;top:14px;left:14px;right:14px;height:74px;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 16px;background:rgba(16,24,43,.72);backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,.25);border-radius:22px}.hud-left,.hud-right{display:flex;align-items:center;gap:12px}.pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:8px 13px;font-weight:800}.timer{font-size:26px;color:#ffe071}.timer.danger{color:#ff6161;animation:shake .22s infinite}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.stage{position:absolute;inset:0;overflow:hidden}.prompt-dock{position:absolute;left:50%;bottom:28px;transform:translateX(-50%);z-index:25;width:min(860px,92vw);padding:14px 18px;border-radius:28px;background:rgba(255,255,255,.2);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.35);box-shadow:0 15px 45px rgba(0,0,0,.32);display:grid;grid-template-columns:1fr 1.4fr auto;align-items:center;gap:14px}.target{font-family:var(--kaiti);font-size:46px;line-height:1;text-align:center;color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.2)}.input{height:54px;border:0;border-radius:18px;padding:0 18px;font-size:26px;outline:none;background:#fff;color:#20243a}.hint{position:absolute;left:50%;bottom:118px;transform:translateX(-50%);z-index:24;font-family:var(--kaiti);font-size:24px;color:#fff7cd;text-shadow:0 2px 0 #0007;min-height:32px}.feedback{position:absolute;left:50%;top:25%;transform:translate(-50%,-50%);z-index:28;font-size:48px;font-weight:900;text-shadow:0 6px 0 rgba(0,0,0,.25);pointer-events:none;opacity:0}.feedback.show{animation:popfade .9s ease-out}@keyframes popfade{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}
/* forest */
.forest{background:linear-gradient(#70d6ff 0%,#b7f7ff 45%,#54c96a 46%,#1f9940 100%)}.forest .sun{position:absolute;right:8%;top:12%;font-size:90px;animation:spin 12s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.hill{position:absolute;bottom:0;width:140%;height:34%;left:-10%;background:radial-gradient(ellipse at center,#32b84c 0%,#21933f 70%);border-radius:50% 50% 0 0}.tree{position:absolute;bottom:22%;font-size:80px;animation:sway 2.8s ease-in-out infinite}.t1{left:5%}.t2{right:8%;animation-delay:.6s}.t3{left:78%;bottom:18%;font-size:65px}@keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}.butter{position:absolute;font-size:36px;animation:butter 7s ease-in-out infinite}.b1{left:12%;top:35%}.b2{right:18%;top:30%;animation-delay:1s}@keyframes butter{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(35px,-28px) rotate(15deg)}}.balloon{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);font-family:var(--kaiti);font-size:72px;width:190px;height:230px;border-radius:50% 50% 46% 46%;background:radial-gradient(circle at 32% 25%,#fff9,#ff6b9e 25%,#d8336c 70%);display:flex;align-items:center;justify-content:center;box-shadow:inset -18px -22px 0 rgba(0,0,0,.15),0 22px 50px rgba(0,0,0,.25);animation:balloonFloat 2.2s ease-in-out infinite;color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.2)}.balloon:after{content:"";position:absolute;bottom:-32px;width:3px;height:40px;background:#fff8}.balloon.warn{animation:balloonDanger .25s infinite;background:radial-gradient(circle at 32% 25%,#fff9,#ff5b5b 25%,#9d1111 70%)}@keyframes balloonFloat{0%,100%{transform:translate(-50%,-50%) rotate(-3deg)}50%{transform:translate(-50%,-60%) rotate(3deg)}}@keyframes balloonDanger{0%,100%{transform:translate(-50%,-50%) scale(1.12) rotate(-5deg)}50%{transform:translate(-50%,-52%) scale(1.22) rotate(5deg)}}
/* maze */
.maze{background:linear-gradient(#20204d,#2b2365 55%,#18152f)}.walls{position:absolute;inset:0;background-image:linear-gradient(90deg,rgba(255,255,255,.08) 10px,transparent 10px),linear-gradient(rgba(255,255,255,.08) 10px,transparent 10px);background-size:90px 90px;animation:scrollMaze 2.2s linear infinite}.track{position:absolute;left:0;right:0;top:43%;height:170px;background:linear-gradient(90deg,#ffd166 0 50%,#f78c6b 50% 100%);background-size:120px 100%;border-top:8px solid #fff4;border-bottom:8px solid #0004;animation:road 1s linear infinite}@keyframes road{to{background-position:-120px 0}}@keyframes scrollMaze{to{background-position:-90px 0,-90px 0}}.runner{position:absolute;left:32%;top:45%;font-size:92px;z-index:4;animation:runbob .35s ease-in-out infinite}.monster{position:absolute;left:10%;top:47%;font-size:82px;z-index:4;animation:monsterHop .55s ease-in-out infinite}.finish{position:absolute;right:8%;top:45%;font-size:80px;z-index:3}.dash{animation:dash .45s ease-out!important}@keyframes runbob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-16px) rotate(3deg)}}@keyframes monsterHop{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-18px) scaleX(1.08)}}@keyframes dash{0%{transform:translateX(0)}50%{transform:translateX(100px) scale(1.25)}100%{transform:translateX(0)}}
/* space */
.space{background:radial-gradient(circle at 70% 20%,#5e5cff 0%,transparent 22%),linear-gradient(#090b2e,#16124d 60%,#070713)}.stars{position:absolute;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:40px 40px;animation:stars 2.4s linear infinite}@keyframes stars{to{background-position:-80px 60px}}.planet{position:absolute;border-radius:50%;opacity:.9}.p1{width:160px;height:160px;background:#ffcd70;right:8%;top:20%;box-shadow:inset -25px -20px #e8793a}.p2{width:90px;height:90px;background:#61e0ff;left:9%;bottom:18%;box-shadow:inset -18px -15px #2380c3}.rocket{position:absolute;left:22%;top:43%;font-size:100px;z-index:4;animation:rocket 1s ease-in-out infinite}.meteor{position:absolute;right:22%;top:38%;font-family:var(--kaiti);font-size:58px;padding:25px 35px;border-radius:45px;background:linear-gradient(135deg,#ff5e5e,#ffd166);box-shadow:0 20px 50px rgba(0,0,0,.35);animation:meteor 2s linear infinite;color:#fff;text-shadow:0 4px #0004}.boss{position:absolute;right:6%;top:38%;font-size:110px;animation:boss 1.3s ease-in-out infinite}@keyframes rocket{0%,100%{transform:translateY(0) rotate(8deg)}50%{transform:translateY(-18px) rotate(2deg)}}@keyframes meteor{from{transform:translateX(60px) rotate(3deg)}to{transform:translateX(-60px) rotate(-3deg)}}@keyframes boss{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* tension upgrades */
.distanceBar{position:absolute;left:50%;top:30%;transform:translateX(-50%);width:min(520px,72vw);height:18px;border-radius:999px;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.45);z-index:6;overflow:hidden;box-shadow:0 8px 20px #0005}.distanceFill{height:100%;width:100%;border-radius:999px;background:linear-gradient(90deg,#53ff82,#ffe071,#ff5b5b);transition:width .22s linear}.distanceLabel{position:absolute;left:50%;top:calc(30% - 34px);transform:translateX(-50%);font-family:var(--kaiti);font-size:22px;color:#fff7cd;text-shadow:0 3px #0006;z-index:6}.dangerAura{position:absolute;inset:0;pointer-events:none;opacity:0;background:radial-gradient(circle at 18% 52%,rgba(255,0,70,.38),transparent 22%),radial-gradient(circle at 35% 52%,rgba(255,0,70,.22),transparent 30%);z-index:2;transition:.2s}.maze.hot .dangerAura{opacity:1}.maze.hot .track{animation-duration:.55s}.maze.hot .walls{animation-duration:1s}.maze.hot .monster{filter:drop-shadow(0 0 18px #ff5353);animation-duration:.32s}.runner.safePulse{filter:drop-shadow(0 0 24px #79ff9d)}
.warningText{position:absolute;left:50%;top:23%;transform:translateX(-50%);z-index:7;font-family:var(--kaiti);font-size:34px;color:#ffef7a;text-shadow:0 4px #0008;opacity:0;animation:warnBlink .55s ease-in-out infinite}.space.hot .warningText{opacity:1}@keyframes warnBlink{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.08)}}.space.hot .stars{animation-duration:.75s}.space.hot .meteor{animation-duration:.85s;filter:drop-shadow(0 0 18px #ff5b5b)}.space.hot .rocket{animation-duration:.45s;filter:drop-shadow(0 0 18px #70d6ff)}.space.hot{box-shadow:inset 0 0 80px rgba(255,0,90,.38)}.laser{position:absolute;left:31%;top:49%;height:8px;width:0;background:#9cfffa;border-radius:999px;box-shadow:0 0 18px #9cfffa;z-index:5;animation:laser .28s ease-out forwards}@keyframes laser{to{width:42vw;opacity:0}}.shock{animation:screenShake .22s linear 2}@keyframes screenShake{0%,100%{transform:translate(0)}25%{transform:translate(5px,-3px)}50%{transform:translate(-5px,4px)}75%{transform:translate(3px,3px)}}.bossHealth{position:absolute;right:5%;top:32%;width:160px;height:16px;border-radius:999px;background:#0006;border:2px solid #fff7;overflow:hidden;z-index:5}.bossHealth span{display:block;height:100%;width:100%;background:linear-gradient(90deg,#ff5b5b,#ffe071);transition:width .25s}

.particles{position:absolute;inset:0;pointer-events:none;z-index:30}.particle{position:absolute;width:12px;height:12px;border-radius:50%;background:#ffe071;animation:particle .75s ease-out forwards}@keyframes particle{to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}}
.results{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,#3a86ff,#8338ec,#ff006e)}.results .panel{padding:34px;max-width:800px}.badge-row{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin:20px}.badge{font-size:60px;background:rgba(255,255,255,.18);border-radius:28px;padding:18px;animation:badgeIn .7s ease-out both}@keyframes badgeIn{from{transform:scale(0) rotate(-180deg)}to{transform:scale(1) rotate(0)}}
@media(max-width:700px){.prompt-dock{grid-template-columns:1fr;bottom:12px}.target{font-size:40px}.hud{height:auto;flex-wrap:wrap}.title{font-size:44px}.runner,.rocket{left:24%}.monster{left:4%}}
</style>
</head>

  words:[
    ['新年',['xinnian']],['读书',['dushu']],['帮忙',['bangmang']],['专心',['zhuanxin']],['全家',['quanjia']],['身体',['shenti']],['非常',['feichang']],['朋友',['pengyou']],['美丽',['meili']],['绿色',['lvse']],['蓝天',['lantian']],['红花',['honghua']],['树林',['shulin']],['太阳',['taiyang']],['云朵',['yunduo']],['运动',['yundong']],['行走',['xingzou']],['跑步',['paobu']],['学校',['xuexiao']],['青菜',['qingcai']],['星期',['xingqi']],['香味',['xiangwei']],['消防员',['xiaofangyuan']],['放风筝',['fangfengzheng']],['忘记',['wangji']],['蚂蚁',['mayi']],['蜜蜂',['mifeng']],['青蛙',['qingwa']],['害虫',['haichong']],['地方',['difang']],['喜欢',['xihuan']]
  ],
  sent:[
    ['我喜欢运动',['woxihuanyundong']],['我喜欢青菜',['woxihuanqingcai']],['树林很美丽',['shulinhenmeili']],['绿色的树真美',['lvsedeshuzhenmei']],['小朋友在跑步',['xiaopengyouzaipaobu']],['蚂蚁在爬',['mayizaipa']],['蜜蜂在花上',['mifengzaihuashang']],['青蛙捉害虫',['qingwazhuohaichong']],['我们一起行走',['womenyiqixingzou']],['不要忘记带伞',['buyaowangjidaisan']]
  ]
 }
};
const LEVELS=[{name:'第一关 生字森林',time:12,badge:'🌟',stage:'forest'},{name:'第二关 迷宫快跑',time:16,badge:'🏅',stage:'maze'},{name:'第三关 星空挑战',time:22,badge:'🏆',stage:'space'}];
let grade='p1',level=0,qIndex=0,score=0,combo=0,unlocked=0,timer=0,tick=null,muted=false,current=null,panicPlayed=false,currentDeck=[];
const $=id=>document.getElementById(id);const screens=['menu','map','game','results'];function show(id){screens.forEach(s=>$(s).classList.toggle('active',s===id));}
function unlockAudio(){
  if(muted) return;
  try{
    let AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return;
    let ctx=sound.ctx||(sound.ctx=new AC());
    if(ctx.state==='suspended') ctx.resume();
    // silent warm-up so later explosion / catch sounds work on Chrome, Edge, iPad Safari
    let o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);g.gain.value=0.0001;o.start();o.stop(ctx.currentTime+0.02);
  }catch(e){}
}
document.querySelectorAll('.grade-card').forEach(c=>c.onclick=()=>{document.querySelectorAll('.grade-card').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');grade=c.dataset.grade;});
$('startBtn').onclick=()=>{unlockAudio();score=0;combo=0;unlocked=0;$('score').textContent='0';$('combo').textContent='0';show('map');renderMap();};$('homeBtn').onclick=()=>{unlockAudio();show('map');clearInterval(tick);renderMap();};$('soundBtn').onclick=()=>{muted=!muted;$('soundBtn').textContent=muted?'🔇':'🔊'; if(!muted) unlockAudio();};$('againBtn').onclick=()=>{level=0;qIndex=0;score=0;combo=0;unlocked=0;$('score').textContent='0';$('combo').textContent='0';show('menu');};
document.querySelectorAll('.playLevel').forEach(b=>b.onclick=()=>{let l=+b.dataset.level;if(l<=unlocked) startLevel(l);});
$('submitBtn').onclick=check;$('answer').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
function renderMap(){for(let i=0;i<3;i++)$('node'+(i+1)).classList.toggle('locked',i>unlocked)}
function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function startLevel(l){unlockAudio();level=l;qIndex=0;combo=0;currentDeck=shuffle(baseListForLevel()).slice(0,8);show('game');$('score').textContent=score;$('combo').textContent=combo;buildStage();nextQ();}
function buildStage(){let st=LEVELS[level].stage, html=''; if(st==='forest') html=`<div class="forest stage"><div class="sun">☀️</div><div class="hill"></div><div class="tree t1">🌳</div><div class="tree t2">🌲</div><div class="tree t3">🌴</div><div class="butter b1">🦋</div><div class="butter b2">🐦</div><div class="balloon" id="mainThing">字</div></div>`; if(st==='maze') html=`<div class="maze stage" id="mazeStage"><div class="walls"></div><div class="dangerAura"></div><div class="track"></div><div class="distanceLabel">别让小怪追上拼拼熊！</div><div class="distanceBar"><div class="distanceFill" id="distanceFill"></div></div><div class="runner" id="runner">🐼</div><div class="monster" id="monster">👾</div><div class="finish">🏁</div></div>`; if(st==='space') html=`<div class="space stage" id="spaceStage"><div class="stars"></div><div class="warningText">陨石靠近了！</div><div class="planet p1"></div><div class="planet p2"></div><div class="rocket" id="rocket">🚀</div><div class="meteor" id="mainThing">字</div><div class="bossHealth"><span id="bossHP"></span></div><div class="boss" id="boss">🤖</div></div>`; $('stage').innerHTML=html;}
function baseListForLevel(){return level===0?DATA[grade].single:level===1?DATA[grade].words:DATA[grade].sent}
function listForLevel(){return currentDeck.length?currentDeck:baseListForLevel()}
function nextQ(){clearInterval(tick);let arr=listForLevel(); if(qIndex>=arr.length){completeLevel();return;} current=arr[qIndex++]; $('target').textContent=current[0]; let mt=$('mainThing'); if(mt) mt.textContent=current[0]; $('answer').value=''; $('answer').focus(); $('hint').textContent=''; $('levelName').textContent=LEVELS[level].name; timer=LEVELS[level].time; panicPlayed=false; updateTimer(); tick=setInterval(()=>{timer--;updateTimer(); if(timer<=0){clearInterval(tick);wrong(true)}},1000);}
function updateTimer(){
 let t=$('timer'), max=LEVELS[level].time, ratio=Math.max(0,Math.min(1,timer/max));
 t.textContent='⏱ '+timer;t.classList.toggle('danger',timer<=5);
 let mt=$('mainThing'); if(mt) mt.classList.toggle('warn',timer<=5);
 let maze=$('mazeStage'), monster=$('monster'), fill=$('distanceFill');
 if(level===1 && maze && monster){
   const runnerX=32, far=7, near=25.5; // left percentages; near means monster almost catches panda
   const pos=far+(1-ratio)*(near-far);
   monster.style.left=pos+'%';
   if(fill) fill.style.width=Math.max(8, ratio*100)+'%';
   maze.classList.toggle('hot',timer<=5);
   if(timer<=5 && !panicPlayed){panicPlayed=true;panicSound();}
 }
 let space=$('spaceStage'), hp=$('bossHP');
 if(level===2 && space){
   space.classList.toggle('hot',timer<=7);
   if(hp) hp.style.width=Math.max(12,(1-(qIndex-1)/listForLevel().length)*100)+'%';
   if(timer<=7 && !panicPlayed){panicPlayed=true;panicSound();}
 }
}
function clean(s){return (s||'').toLowerCase().replace(/[^a-zv]/g,'');}
function check(){let ans=clean($('answer').value); if(!ans)return; let ok=current[1].map(clean).includes(ans); if(ok) correct(); else wrong(false);}
function correct(){clearInterval(tick);score+=10+combo*2;combo++;$('score').textContent=score;$('combo').textContent=combo;pop(combo>=5?'太棒了！':'答对了！');sound(720,.08);sound(960,.08,.08);sceneCorrect();setTimeout(nextQ,720);}
function wrong(timeout){
 combo=0;$('combo').textContent=combo;
 if(timeout && level===0){pop('砰！气球爆了！');}
 else if(timeout && level===1){pop('小怪追上了！'); caughtSound();}
 else if(timeout && level===2){pop('危险！陨石太近了！'); alarmSound();}
 else pop('再试一次');
 sound(180,.16);sceneWrong();
 let tip=''; if(current[0].includes('女')||current[1].some(x=>x.includes('v'))) tip='小提示：ü 用 v，例如 女 = nv'; else if(current[0].includes('长')) tip='小提示：长 可以读 chang 或 zhang，看词语意思。'; else if(current[0].includes('行')) tip='小提示：行 可以读 xing 或 hang。'; $('hint').textContent=tip||('正确拼音：'+current[1][0]); setTimeout(nextQ,1200);
}
function completeLevel(){unlocked=Math.max(unlocked,level+1);pop('获得徽章 '+LEVELS[level].badge);sound(520,.12);sound(780,.12,.12);sound(1040,.16,.24);burst(innerWidth/2,innerHeight/2,36); if(level<2){show('map');renderMap();}else finish();}
function finish(){show('results');$('resultText').textContent=`得分：${score}`;$('badges').innerHTML=LEVELS.map(x=>`<div class="badge">${x.badge}</div>`).join('');}
function pop(txt){let f=$('feedback');f.textContent=txt;f.classList.remove('show');void f.offsetWidth;f.classList.add('show')}
function sceneCorrect(){
 burst(innerWidth/2,innerHeight/2,18);
 let r=$('runner'); if(r){r.classList.add('dash','safePulse'); setTimeout(()=>r.classList.remove('dash','safePulse'),520);}
 let rocket=$('rocket'), space=$('spaceStage'), boss=$('boss');
 if(rocket){rocket.style.filter='drop-shadow(0 0 22px #fff)';setTimeout(()=>rocket.style.filter='',350)}
 if(space){let l=document.createElement('div');l.className='laser';space.appendChild(l);setTimeout(()=>l.remove(),320); if(boss){boss.style.transform='scale(.86) rotate(-8deg)';setTimeout(()=>boss.style.transform='',250)} }
}
function sceneWrong(){
 let stage=$('stage'); stage.classList.add('shock'); setTimeout(()=>stage.classList.remove('shock'),500);
 let m=$('monster'); if(m){m.style.transform='translateX(48px) scale(1.2)';setTimeout(()=>m.style.transform='',420)}
 let meteor=$('mainThing'); if(level===2 && meteor){meteor.style.transform='translateX(-120px) scale(1.15)';setTimeout(()=>meteor.style.transform='',420)}
 burst(innerWidth*.5,innerHeight*.42,18); boomSound();
}
function burst(x,y,n){let box=$('particles'); for(let i=0;i<n;i++){let p=document.createElement('div');p.className='particle';p.style.left=x+'px';p.style.top=y+'px';let a=Math.random()*Math.PI*2,d=50+Math.random()*150;p.style.setProperty('--x',Math.cos(a)*d+'px');p.style.setProperty('--y',Math.sin(a)*d+'px');p.style.background=['#ffe071','#ff6b9e','#70d6ff','#9cff70'][i%4];box.appendChild(p);setTimeout(()=>p.remove(),800)}}
function sound(freq,dur,delay=0,type='sine',gain=.13){
 if(muted)return;
 try{let AC=window.AudioContext||window.webkitAudioContext;let ctx=sound.ctx||(sound.ctx=new AC()); if(ctx.state==='suspended')ctx.resume();let o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type=type;let t=ctx.currentTime+delay;g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(gain,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur+.04)}catch(e){}
}
function panicSound(){sound(420,.06,0,'square',.08);sound(330,.06,.13,'square',.09);sound(240,.09,.26,'square',.1)}
function boomSound(){sound(160,.08,0,'sawtooth',.18);sound(82,.25,.04,'triangle',.22);sound(45,.32,.14,'sawtooth',.16)}
function caughtSound(){sound(95,.18,0,'sawtooth',.22);sound(150,.08,.08,'square',.16);sound(70,.28,.18,'triangle',.18)}
function alarmSound(){sound(520,.08,0,'square',.12);sound(360,.08,.12,'square',.12);sound(520,.08,.24,'square',.12)}
</script>
