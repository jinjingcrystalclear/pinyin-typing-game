<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼音打字小勇士</title>
  <style>
    * { box-sizing: border-box; }
    :root{
      --ink:#f7fbff; --muted:#b9c7e6; --panel:rgba(9,18,45,.82); --panel2:rgba(17,31,72,.74);
      --cyan:#55e6ff; --gold:#ffd166; --pink:#ff5ca8; --green:#7cffb2; --danger:#ff4d6d;
    }
    body {
      margin: 0;
      font-family: "KaiTi", "STKaiti", "楷体", "KaiTi_GB2312", serif;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(85,230,255,.30) 0 11%, transparent 27%),
        radial-gradient(circle at 82% 12%, rgba(255,92,168,.20) 0 9%, transparent 24%),
        radial-gradient(circle at 50% 95%, rgba(255,209,102,.16) 0 16%, transparent 34%),
        linear-gradient(135deg, #071124 0%, #101a3b 38%, #251540 72%, #071124 100%);
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.55;
      background:
        linear-gradient(rgba(85,230,255,.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(85,230,255,.09) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.15));
    }
    body::after{
      content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
      background: radial-gradient(circle, rgba(255,255,255,.18) 1px, transparent 1.5px);
      background-size: 34px 34px; animation: drift 18s linear infinite; opacity:.45;
    }
    @keyframes drift{to{background-position:340px 170px;}}
    .cloud,.hill,.star-bg{display:none;}
    .app{position:relative; z-index:1; max-width:1040px; margin:0 auto; padding:28px;}
    .card{
      background: linear-gradient(180deg, rgba(13,28,68,.90), rgba(10,18,43,.84));
      border:1px solid rgba(85,230,255,.36); border-radius:30px; padding:26px;
      box-shadow: 0 24px 70px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.07);
      backdrop-filter: blur(10px);
    }
    h1{margin:0 0 10px; font-size:clamp(34px,5vw,58px); text-align:center; color:#fff; letter-spacing:3px; text-shadow:0 0 18px rgba(85,230,255,.5), 0 3px 0 rgba(0,0,0,.25);}
    .subtitle{text-align:center; font-size:24px; color:var(--muted); margin-bottom:20px;}
    .mascot{font-size:62px; text-align:center; margin:8px 0 12px; filter: drop-shadow(0 0 16px rgba(85,230,255,.45));}
    .btn{border:0; border-radius:16px; padding:14px 26px; font-family:inherit; font-size:24px; font-weight:bold; cursor:pointer; margin:8px; color:#061225; background:linear-gradient(180deg,#7cffb2,#20d483); box-shadow:0 8px 0 #0e8c55,0 0 22px rgba(124,255,178,.26); transition:.12s;}
    .btn:hover{transform:translateY(-2px); filter:brightness(1.05);} .btn:active{transform:translateY(5px); box-shadow:0 3px 0 #0e8c55;}
    .btn.secondary{background:linear-gradient(180deg,#55e6ff,#38a7ff); box-shadow:0 8px 0 #1769a8,0 0 22px rgba(85,230,255,.25);}
    .btn.locked{background:linear-gradient(180deg,#657086,#3d465a); color:#cbd5e1; box-shadow:0 8px 0 #252b38; cursor:not-allowed;}
    .center{text-align:center;}
    .level-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:18px; margin-top:20px;}
    .level-card{background:linear-gradient(180deg,rgba(21,42,92,.86),rgba(15,27,63,.78)); border:1px solid rgba(255,255,255,.12); border-radius:24px; padding:18px; text-align:center; min-height:220px; box-shadow:inset 0 0 28px rgba(85,230,255,.06);}
    .level-card h2{font-size:30px; margin:8px 0; color:var(--gold);} .level-card p{font-size:21px; margin:8px 0; color:var(--muted);} .badge{font-size:46px; filter:drop-shadow(0 0 12px rgba(255,209,102,.45));}
    .hud{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px;}
    .hud div{background:rgba(3,9,24,.62); border:1px solid rgba(85,230,255,.32); border-radius:16px; padding:10px; font-size:21px; text-align:center; font-weight:bold; color:#eaf6ff; box-shadow:inset 0 0 18px rgba(85,230,255,.07);}
    .stage-title{text-align:center; font-size:34px; color:var(--gold); margin:6px 0 12px; text-shadow:0 0 14px rgba(255,209,102,.35);}
    .play-area{position:relative; min-height:390px; border-radius:28px; overflow:hidden; padding:18px; background:linear-gradient(180deg,rgba(9,21,52,.95),rgba(18,15,51,.96)); border:1px solid rgba(85,230,255,.45); box-shadow:inset 0 0 60px rgba(85,230,255,.10), inset 0 -60px 80px rgba(255,92,168,.08);}
    .play-area::before{content:""; position:absolute; inset:0; pointer-events:none; background:radial-gradient(circle at 50% 40%, rgba(85,230,255,.16), transparent 32%), linear-gradient(90deg,transparent 0 48%, rgba(85,230,255,.10) 49%, transparent 50%);}
    .play-area::after{content:""; position:absolute; left:8%; right:8%; top:64%; height:1px; background:linear-gradient(90deg,transparent,rgba(85,230,255,.7),transparent); box-shadow:0 0 16px rgba(85,230,255,.8); opacity:.7;}
    .track{position:absolute; left:0; right:0; bottom:0; height:68px; background:linear-gradient(180deg,rgba(85,230,255,.06),rgba(85,230,255,.16)); border-top:1px solid rgba(85,230,255,.45);}
    .track::before{content:""; position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent 0 34px,rgba(85,230,255,.18) 34px 36px);}
    .balloon-wrap{height:238px; display:flex; justify-content:center; align-items:center; perspective:900px;}
    .balloon{width:172px; height:172px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; isolation:isolate; transition:transform .35s linear, filter .2s; animation:orbFloat 2.4s infinite alternate ease-in-out; background:radial-gradient(circle at 34% 25%,rgba(255,255,255,.95) 0 8%,rgba(85,230,255,.72) 13%,rgba(74,99,255,.86) 44%,rgba(255,92,168,.82) 78%); box-shadow:inset -18px -24px 40px rgba(0,0,0,.28), inset 12px 14px 22px rgba(255,255,255,.13),0 0 26px rgba(85,230,255,.55),0 20px 42px rgba(0,0,0,.32);}
    .balloon::before{content:""; position:absolute; inset:-8px; border-radius:50%; border:2px solid rgba(85,230,255,.50); box-shadow:0 0 18px rgba(85,230,255,.55), inset 0 0 20px rgba(255,255,255,.08); z-index:-1; animation:ringSpin 5s linear infinite;}
    .balloon::after{content:""; position:absolute; left:50%; bottom:-44px; width:3px; height:48px; background:linear-gradient(var(--cyan),transparent); box-shadow:0 0 8px var(--cyan); transform:translateX(-50%);}
    .word{font-family:"KaiTi","STKaiti","楷体","KaiTi_GB2312",serif; font-size:clamp(38px,7vw,76px); font-weight:bold; color:white; text-shadow:0 3px 8px rgba(0,0,0,.45),0 0 18px rgba(255,255,255,.25); padding:10px; text-align:center; line-height:1.08;}
    @keyframes orbFloat{from{transform:translateY(8px) rotateX(0deg) scale(var(--scale,1));} to{transform:translateY(-12px) rotateX(6deg) scale(var(--scale,1));}}
    @keyframes ringSpin{to{transform:rotate(360deg);}}
    .danger{animation:dangerPulse .16s infinite alternate!important; filter:saturate(1.45) brightness(1.08);} @keyframes dangerPulse{from{transform:translateX(-4px) scale(var(--scale,1)); box-shadow:0 0 28px rgba(255,77,109,.7),0 20px 42px rgba(0,0,0,.32);} to{transform:translateX(4px) scale(calc(var(--scale,1) + .05)); box-shadow:0 0 42px rgba(255,77,109,.95),0 20px 42px rgba(0,0,0,.32);}}
    .pop{animation:energyPop .55s forwards!important;} @keyframes energyPop{0%{transform:scale(var(--scale,1)); opacity:1; filter:brightness(1);}55%{transform:scale(1.72); opacity:.92; filter:brightness(2.4);}100%{transform:scale(.08); opacity:0; filter:brightness(3);}}
    .particle{position:absolute; left:50%; top:42%; width:10px; height:10px; border-radius:50%; background:var(--cyan); pointer-events:none; animation:burst .9s cubic-bezier(.1,.75,.25,1) forwards; z-index:5; box-shadow:0 0 12px currentColor; color:var(--cyan);} .particle:nth-child(2n){background:var(--pink); color:var(--pink);} .particle:nth-child(3n){background:var(--gold); color:var(--gold);} .particle:nth-child(4n){background:var(--green); color:var(--green);} @keyframes burst{0%{transform:translate(0,0) scale(1.4); opacity:1;}70%{opacity:1;}100%{transform:translate(var(--x),var(--y)) scale(.05); opacity:0;}}
    .screen-flash{animation:flash .38s ease-out;} @keyframes flash{0%{box-shadow:inset 0 0 0 999px rgba(255,255,255,.65);}100%{box-shadow:inset 0 0 0 0 rgba(255,255,255,0);}}
    .timer-hot{color:var(--danger); animation:pulse .35s infinite alternate;} @keyframes pulse{from{transform:scale(1);}to{transform:scale(1.18);}}
    .input-row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:14px; position:relative; z-index:2;}
    input{width:min(520px,90%); border:2px solid rgba(85,230,255,.65); border-radius:18px; padding:14px 18px; font-size:28px; text-align:center; outline:none; font-family:Arial,sans-serif; color:#ecfeff; background:rgba(2,8,23,.72); box-shadow:0 0 18px rgba(85,230,255,.12);}
    input::placeholder{color:#90a4c4;} input:focus{border-color:var(--gold); box-shadow:0 0 24px rgba(255,209,102,.25);}
    .feedback{text-align:center; font-size:28px; min-height:42px; margin-top:12px; font-weight:bold; position:relative; z-index:2;} .correct{color:var(--green);} .wrong{color:var(--danger);} .pinyin-show{text-align:center; font-size:25px; color:#c9f6ff; min-height:34px; font-family:Arial,sans-serif; position:relative; z-index:2;}
    .hidden{display:none;} .result-list{font-size:25px; line-height:1.8; text-align:center; color:#eaf6ff;} .badge-row{text-align:center; font-size:60px; margin:15px 0;} .sparkle{animation:sparkle .8s ease-in-out infinite alternate;} @keyframes sparkle{from{transform:scale(1);}to{transform:scale(1.15) rotate(4deg);}}
    @media(max-width:680px){.hud{grid-template-columns:repeat(2,1fr);} .app{padding:12px;} .balloon{width:150px;height:150px;} }
</style>
</head>
<body>
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="hill h1"></div><div class="hill h2"></div><div class="star-bg s1">✨</div><div class="star-bg s2">⭐</div><div class="star-bg s3">🌟</div>
  <div class="app">
    <section id="home" class="card">
      <h1>拼音打字小勇士</h1>
      <div class="subtitle">进入拼音能量训练场，完成三关挑战，收集三个徽章！</div>
      <div class="mascot">🐼⌨️💠</div>
      <div class="center"><button id="soundBtn" class="btn secondary" onclick="toggleSound()">音效：开</button></div>
      <div class="center">
        <button class="btn" onclick="showLevels()">开始游戏</button>
      </div>
    </section>

    <section id="levels" class="card hidden">
      <h1>选择关卡</h1>
      <div class="level-grid">
        <div class="level-card">
          <div class="badge">⭐</div>
          <h2>第一关：生字能量站</h2>
          <p>看生字，打拼音。</p>
          <button class="btn" onclick="startLevel(1)">开始第一关</button>
        </div>
        <div class="level-card">
          <div class="badge">🏅</div>
          <h2>第二关：词语轨道</h2>
          <p>完成第一关后解锁。</p>
          <button id="level2btn" class="btn locked" onclick="startLevel(2)">进入第二关</button>
        </div>
        <div class="level-card">
          <div class="badge">🏆</div>
          <h2>第三关：句子挑战塔</h2>
          <p>完成第二关后解锁。</p>
          <button id="level3btn" class="btn locked" onclick="startLevel(3)">进入第三关</button>
        </div>
      </div>
      <div class="center"><button class="btn secondary" onclick="resetGame()">重新挑战</button></div>
    </section>

    <section id="game" class="card hidden">
      <div class="stage-title" id="stageTitle"></div>
      <div class="hud">
        <div>题目 <span id="qNum">1</span>/<span id="qTotal">5</span></div>
        <div>时间 <span id="timeLeft">10</span> 秒</div>
        <div>得分 <span id="score">0</span></div>
        <div>徽章 <span id="badges">0</span>/3</div>
      </div>
      <div class="play-area" id="playArea">
        <div class="track"></div>
        <div class="balloon-wrap">
          <div id="balloon" class="balloon">
            <div id="word" class="word">人</div>
          </div>
        </div>
        <div class="input-row">
          <input id="answer" placeholder="请输入拼音，如 ren" autocomplete="off" />
          <button class="btn" onclick="checkAnswer()">提交</button>
        </div>
        <div id="feedback" class="feedback"></div>
        <div id="pinyinShow" class="pinyin-show"></div>
      </div>
    </section>

    <section id="levelComplete" class="card hidden center">
      <h1 id="completeTitle">过关啦！</h1>
      <div id="earnedBadge" class="badge-row sparkle">⭐</div>
      <div id="completeMsg" class="result-list"></div>
      <button id="nextLevelBtn" class="btn" onclick="goNextLevel()">进入下一关</button>
      <button class="btn secondary" onclick="showLevels()">查看关卡</button>
    </section>

    <section id="final" class="card hidden center">
      <h1>太棒了！</h1>
      <div class="mascot sparkle">🐼🎉🏆</div>
      <div class="result-list">
        你完成了拼音打字挑战！<br>
        我的得分：<span id="finalScore"></span><br>
        我的正确率：<span id="finalAcc"></span>%<br>
        我获得的徽章：⭐ 🏅 🏆
      </div>
      <button class="btn" onclick="resetGame()">重新挑战</button>
    </section>
  </div>

<script>
const levelData = {
  1: {
    title: "第一关：生字能量站",
    time: 10,
    points: 10,
    badge: "⭐",
    badgeName: "生字小星星",
    items: [
      {zh:"人", py:"ren", tone:"rén"}, {zh:"口", py:"kou", tone:"kǒu"},
      {zh:"木", py:"mu", tone:"mù"}, {zh:"土", py:"tu", tone:"tǔ"},
      {zh:"八", py:"ba", tone:"bā"}, {zh:"女", py:"nv", tone:"nǚ"},
      {zh:"儿", py:"er", tone:"ér"}, {zh:"日", py:"ri", tone:"rì"},
      {zh:"子", py:"zi", tone:"zǐ"}, {zh:"山", py:"shan", tone:"shān"},
      {zh:"羊", py:"yang", tone:"yáng"}, {zh:"田", py:"tian", tone:"tián"},
      {zh:"手", py:"shou", tone:"shǒu"}, {zh:"牛", py:"niu", tone:"niú"},
      {zh:"月", py:"yue", tone:"yuè"}, {zh:"天", py:"tian", tone:"tiān"},
      {zh:"水", py:"shui", tone:"shuǐ"}
    ]
  },
  2: {
    title: "第二关：词语轨道",
    time: 15,
    points: 15,
    badge: "🏅",
    badgeName: "词语小达人",
    items: [
      {zh:"山羊", py:"shan yang", tone:"shān yáng"},
      {zh:"太阳", py:"tai yang", tone:"tài yáng"},
      {zh:"爸爸", py:"ba ba", tone:"bà ba"},
      {zh:"妈妈", py:"ma ma", tone:"mā ma"},
      {zh:"大小", py:"da xiao", tone:"dà xiǎo"},
      {zh:"上下", py:"shang xia", tone:"shàng xià"},
      {zh:"白云", py:"bai yun", tone:"bái yún"},
      {zh:"木马", py:"mu ma", tone:"mù mǎ"},
      {zh:"开门", py:"kai men", tone:"kāi mén"},
      {zh:"华文", py:"hua wen", tone:"huá wén"}
    ]
  },
  3: {
    title: "第三关：句子挑战塔",
    time: 25,
    points: 20,
    badge: "🏆",
    badgeName: "句子小勇士",
    items: [
      {zh:"我是小学生。", py:"wo shi xiao xue sheng", tone:"wǒ shì xiǎo xué shēng"},
      {zh:"爸爸妈妈好。", py:"ba ba ma ma hao", tone:"bà ba mā ma hǎo"},
      {zh:"山羊在山上。", py:"shan yang zai shan shang", tone:"shān yáng zài shān shàng"},
      {zh:"小鸟在树上。", py:"xiao niao zai shu shang", tone:"xiǎo niǎo zài shù shàng"},
      {zh:"今天有白云。", py:"jin tian you bai yun", tone:"jīn tiān yǒu bái yún"}
    ]
  }
};

let unlocked = 1;
let badges = [];
let currentLevel = 1;
let questions = [];
let index = 0;
let score = 0;
let totalAnswered = 0;
let totalCorrect = 0;
let timeLeft = 10;
let timer = null;
let answered = false;
let soundOn = true;
let audioCtx = null;
function beep(freq=600, duration=.12, type="sine", volume=.08){
  if(!soundOn) return;
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}
function playCorrect(){ beep(660,.08,"sine",.07); setTimeout(()=>beep(880,.12,"sine",.07),90); }
function playWrong(){ beep(220,.18,"sawtooth",.06); }
function playPop(){ beep(90,.18,"sawtooth",.12); setTimeout(()=>beep(55,.25,"square",.08),70); }
function playBadge(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.11,"triangle",.08),i*95)); }
function toggleSound(){ soundOn=!soundOn; document.getElementById("soundBtn").textContent = "音效：" + (soundOn ? "开" : "关"); }
function makeExplosion(){
  const area = document.getElementById("playArea");
  area.classList.add("screen-flash");
  setTimeout(()=>area.classList.remove("screen-flash"),380);
  for(let i=0;i<42;i++){
    const p=document.createElement("span");
    p.className="particle";
    const angle=(Math.PI*2*i/42);
    const dist=110+Math.random()*140;
    p.style.setProperty("--x", Math.cos(angle)*dist+"px");
    p.style.setProperty("--y", Math.sin(angle)*dist+"px");
    area.appendChild(p);
    setTimeout(()=>p.remove(),950);
  }
}

function hideAll(){ ["home","levels","game","levelComplete","final"].forEach(id => document.getElementById(id).classList.add("hidden")); }
function showLevels(){
  hideAll(); document.getElementById("levels").classList.remove("hidden");
  document.getElementById("level2btn").className = unlocked >= 2 ? "btn" : "btn locked";
  document.getElementById("level3btn").className = unlocked >= 3 ? "btn" : "btn locked";
}
function shuffle(arr){ return [...arr].sort(() => Math.random() - 0.5); }
function startLevel(lv){
  if(lv > unlocked) return;
  currentLevel = lv;
  questions = shuffle(levelData[lv].items).slice(0, lv === 3 ? 5 : 8);
  index = 0;
  hideAll(); document.getElementById("game").classList.remove("hidden");
  document.getElementById("stageTitle").textContent = levelData[lv].title;
  document.getElementById("qTotal").textContent = questions.length;
  loadQuestion();
}
function loadQuestion(){
  answered = false;
  clearInterval(timer);
  const data = levelData[currentLevel];
  const q = questions[index];
  timeLeft = data.time;
  document.getElementById("qNum").textContent = index + 1;
  document.getElementById("timeLeft").textContent = timeLeft;
  document.getElementById("timeLeft").classList.remove("timer-hot");
  document.getElementById("score").textContent = score;
  document.getElementById("badges").textContent = badges.length;
  document.getElementById("word").textContent = q.zh;
  document.getElementById("answer").value = "";
  document.getElementById("answer").disabled = false;
  document.getElementById("answer").focus();
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";
  document.getElementById("pinyinShow").textContent = "";
  const balloon = document.getElementById("balloon");
  balloon.className = "balloon";
  balloon.style.setProperty("--scale", "1");
  timer = setInterval(tick, 1000);
}
function tick(){
  timeLeft--;
  document.getElementById("timeLeft").textContent = timeLeft;
  const maxTime = levelData[currentLevel].time;
  const scale = 1 + ((maxTime - timeLeft) / maxTime) * 0.65;
  const balloon = document.getElementById("balloon");
  balloon.style.setProperty("--scale", scale.toFixed(2));
  if(timeLeft <= 5) { balloon.classList.add("danger"); document.getElementById("timeLeft").classList.add("timer-hot"); if(timeLeft>0) beep(440,.05,"square",.035); }
  if(timeLeft <= 0){
    clearInterval(timer);
    timeUp();
  }
}
function normalize(s){ return s.trim().toLowerCase().replace(/ü/g,"v").replace(/u:/g,"v").replace(/\s+/g," "); }
function checkAnswer(){
  if(answered) return;
  const q = questions[index];
  const ans = normalize(document.getElementById("answer").value);
  if(ans === q.py){
    answered = true;
    clearInterval(timer);
    playCorrect();
    score += levelData[currentLevel].points;
    totalAnswered++; totalCorrect++;
    document.getElementById("score").textContent = score;
    document.getElementById("feedback").textContent = "答对了！太棒了！";
    document.getElementById("feedback").className = "feedback correct";
    document.getElementById("pinyinShow").textContent = q.zh + "  " + q.tone;
    setTimeout(nextQuestion, 1100);
  } else {
    playWrong();
    document.getElementById("feedback").textContent = "差一点！再试试看。";
    document.getElementById("feedback").className = "feedback wrong";
  }
}
function timeUp(){
  answered = true;
  totalAnswered++;
  const q = questions[index];
  document.getElementById("answer").disabled = true;
  document.getElementById("balloon").classList.add("pop");
  playPop();
  makeExplosion();
  document.getElementById("feedback").textContent = "时间到！气球爆开了！";
  document.getElementById("feedback").className = "feedback wrong";
  document.getElementById("pinyinShow").textContent = "正确拼音：" + q.tone + "  请输入：" + q.py;
  setTimeout(nextQuestion, 1800);
}
function nextQuestion(){
  index++;
  if(index >= questions.length) completeLevel();
  else loadQuestion();
}
function completeLevel(){
  clearInterval(timer);
  const data = levelData[currentLevel];
  playBadge();
  if(!badges.includes(currentLevel)) badges.push(currentLevel);
  if(currentLevel === unlocked && unlocked < 3) unlocked++;
  hideAll(); document.getElementById("levelComplete").classList.remove("hidden");
  document.getElementById("earnedBadge").textContent = data.badge;
  document.getElementById("completeTitle").textContent = "你获得了【" + data.badgeName + "】！";
  document.getElementById("completeMsg").innerHTML = "本关完成！<br>继续挑战，帮小熊猫收集所有徽章。";
  document.getElementById("nextLevelBtn").classList.toggle("hidden", currentLevel === 3);
  if(currentLevel === 3) setTimeout(showFinal, 1400);
}
function goNextLevel(){ startLevel(currentLevel + 1); }
function showFinal(){
  hideAll(); document.getElementById("final").classList.remove("hidden");
  document.getElementById("finalScore").textContent = score;
  const acc = totalAnswered ? Math.round(totalCorrect / totalAnswered * 100) : 0;
  document.getElementById("finalAcc").textContent = acc;
}
function resetGame(){
  clearInterval(timer);
  unlocked = 1; badges = []; score = 0; totalAnswered = 0; totalCorrect = 0;
  hideAll(); document.getElementById("home").classList.remove("hidden");
}
document.getElementById("answer").addEventListener("keydown", e => { if(e.key === "Enter") checkAnswer(); });
</script>
</body>
</html>
